name: Publish Python SDK

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - "LICENSE"
      - "renovate.json"
      - ".github/**"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GIT__TOKEN || secrets.GH__TOKEN || github.token }}

      - name: Prepare version
        id: version
        run: |
          set -euo pipefail

          versions_file="$(mktemp)"
          git fetch --tags --force

          git tag --list 'v[0-9]*.[0-9]*.[0-9]*' |
            sed -E 's/^v//' |
            awk '/^[0-9]+\.[0-9]+\.[0-9]+$/ { print }' >> "${versions_file}"

          pypi_response="$(mktemp)"
          if curl -fsSL "https://pypi.org/pypi/leadping/json" -o "${pypi_response}"; then
            python3 - "${pypi_response}" <<'PY' >> "${versions_file}"
          import json
          import re
          import sys

          with open(sys.argv[1], encoding="utf-8") as handle:
              data = json.load(handle)

          for version in data.get("releases", {}):
              if re.fullmatch(r"\d+\.\d+\.\d+", version):
                  print(version)
          PY
          fi

          version="$(python3 - "${versions_file}" <<'PY'
          import re
          import sys

          best = None
          with open(sys.argv[1], encoding="utf-8") as handle:
              for line in handle:
                  version = line.strip()
                  if not re.fullmatch(r"\d+\.\d+\.\d+", version):
                      continue

                  parsed = tuple(int(part) for part in version.split("."))
                  if best is None or parsed > best:
                      best = parsed

          if best is None:
              print("1.0.0")
          else:
              major, minor, patch = best
              print(f"{major}.{minor}.{patch + 1}")
          PY
          )"

          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must look like 1.2.3."
            exit 1
          fi

          tag="v${version}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::Tag ${tag} already exists."
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build package
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GH__TOKEN || secrets.GIT__TOKEN || github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          GIT_EMAIL: ${{ secrets.GIT__EMAIL || 'support@leadping.ai' }}
        run: |
          set -euo pipefail

          git config user.name "leadpingai-bot"
          git config user.email "${GIT_EMAIL}"
          git tag "${TAG}"
          git push origin "${TAG}"

          gh release create "${TAG}" dist/* \
            --title "${TAG}" \
            --notes "Generated Leadping Python SDK ${TAG}."
